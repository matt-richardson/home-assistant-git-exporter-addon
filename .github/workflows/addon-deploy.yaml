name: Deploy

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Version to deploy (e.g. 0.1.0)
        required: true

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  information:
    name: ℹ️ Gather add-on information
    runs-on: ubuntu-latest
    outputs:
      addon-folder: ${{ steps.information.outputs.target }}
      slug: ${{ steps.information.outputs.slug }}
      architectures: ${{ steps.information.outputs.architectures }}
      build-file: ${{ steps.information.outputs.build }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: ↩️ Checkout
        uses: actions/checkout@v6.0.2

      - name: ℹ️ Gather addon info
        id: information
        uses: frenck/action-addon-information@v1

      - name: ℹ️ Determine version from release tag
        id: release
        run: |
          version="${{ github.event.release.tag_name || github.event.inputs.version }}"
          version="${version,,}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  bump-version:
    name: 📝 Bump version to ${{ needs.information.outputs.version }}
    runs-on: ubuntu-latest
    needs: information
    permissions:
      contents: write
    steps:
      - name: ↩️ Checkout
        uses: actions/checkout@v6.0.2

      - name: 📝 Update version in config.yaml
        run: |
          sed -i "s/^version:.*$/version: ${{ needs.information.outputs.version }}/" \
            "${{ needs.information.outputs.addon-folder }}/config.yaml"

      - name: 💾 Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ needs.information.outputs.addon-folder }}/config.yaml"
          git commit -m "Bump version to ${{ needs.information.outputs.version }}"
          git push

  build-and-push:
    name: 💽 Build & push ${{ matrix.architecture }}
    runs-on: ubuntu-24.04
    needs: [information, bump-version]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        architecture: ${{ fromJson(needs.information.outputs.architectures) }}
      fail-fast: false
    steps:
      - name: ↩️ Checkout
        uses: actions/checkout@v6.0.2

      - name: ℹ️ Resolve base image for architecture
        id: addon-meta
        shell: bash
        run: |
          from=$(yq --no-colors eval ".build_from.${{ matrix.architecture }}" "${{ needs.information.outputs.build-file }}")
          echo "from=${from}" >> "$GITHUB_OUTPUT"

          if [[ "${{ matrix.architecture }}" = "amd64" ]]; then
            echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
          elif [[ "${{ matrix.architecture }}" = "i386" ]]; then
            echo "platform=linux/386" >> "$GITHUB_OUTPUT"
          elif [[ "${{ matrix.architecture }}" = "armhf" ]]; then
            echo "platform=linux/arm/v6" >> "$GITHUB_OUTPUT"
          elif [[ "${{ matrix.architecture }}" = "armv7" ]]; then
            echo "platform=linux/arm/v7" >> "$GITHUB_OUTPUT"
          elif [[ "${{ matrix.architecture }}" = "aarch64" ]]; then
            echo "platform=linux/arm64/v8" >> "$GITHUB_OUTPUT"
          else
            echo "::error ::Unknown architecture: ${{ matrix.architecture }}"
            exit 1
          fi

      - name: 🏗️ Install QEMU for multi-platform builds
        run: sudo podman run --rm --privileged docker.io/multiarch/qemu-user-static --reset -p yes

      - name: 🏗️ Pull base image
        run: podman pull --platform "${{ steps.addon-meta.outputs.platform }}" "${{ steps.addon-meta.outputs.from }}"

      - name: 🚀 Build image
        run: |
          image="ghcr.io/${{ github.repository_owner }}/${{ needs.information.outputs.slug }}-${{ matrix.architecture }}"
          tag="${{ needs.information.outputs.version }}"
          podman build \
            --file "./${{ needs.information.outputs.addon-folder }}/Dockerfile" \
            --platform "${{ steps.addon-meta.outputs.platform }}" \
            --build-arg "BUILD_FROM=${{ steps.addon-meta.outputs.from }}" \
            --build-arg "BUILD_ARCH=${{ matrix.architecture }}" \
            --build-arg "BUILD_VERSION=${{ needs.information.outputs.version }}" \
            --tag "${image}:${tag}" \
            "./${{ needs.information.outputs.addon-folder }}"

      - name: 🔑 Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: ⤴️ Push image
        run: podman push "ghcr.io/${{ github.repository_owner }}/${{ needs.information.outputs.slug }}-${{ matrix.architecture }}:${{ needs.information.outputs.version }}"

